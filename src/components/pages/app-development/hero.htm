<!-- =========================
Hero section
===========================-->
<section class="hero-section pb-16 md:pb-16 lg:pb-[88px] xl:pb-[100px]" aria-label="Hero Section">
  <div class="max-w-[1440px] mx-auto">
    <div
      data-ns-animate
      data-delay="0.1"
      class="bg-linear-[180deg,_#B3C3DA_0%,_#93A5BE_100%] overflow-hidden rounded-[20px] relative top-4 lg:top-8 h-auto"
    >
      <figure
        class="absolute inset-0 z-0 translate-x-3 animate-pulse lg:translate-x-4 xl:translate-x-[75px]"
        aria-hidden="true"
      >
        <img src="./images/ns-img-161.svg" alt="Decorative background pattern" />
      </figure>
      <div class="main-container relative z-10">
        <div
          class="flex flex-col md:flex-row items-center pt-36 md:pt-40 gap-y-16 lg:pt-[150px] xl:pt-[170px] pb-12 lg:pb-16 justify-center"
        >
          <div>
            <div class="space-y-2 md:space-y-4 mb-6 md:mb-8 text-center md:text-left">
              <h1
                data-ns-animate
                data-delay="0.2"
                class="max-w-full lg:max-w-[507px] dark:text-secondary"
              >
                Tu club de pádel, organizado de punta a punta.
              </h1>
              <p data-ns-animate data-delay="0.4" class="md:max-w-[429px] text-secondary/60">
                Torneos, ligas, kiosco POS, partidos entre semana y app para jugadores. Multi-sede, pantalla TV y pagos integrados. Pensada para clubs que quieren crecer sin complicarse.
              </p>
            </div>
            <div
              class="flex items-center flex-col sm:flex-row justify-center gap-y-5 md:justify-start sm:gap-x-4 mb-10 lg:mb-14"
            >
              <div class="flex -space-x-3.5" role="group">
                <img
                  data-ns-animate
                  data-delay="0.2"
                  data-direction="right"
                  data-offset="50"
                  class="inline-block size-12 rounded-full ring-2 ring-white dark:ring-black object-cover"
                  src="./images/recrea.jpeg"
                  alt="Recrea - club que confía en Matchly"
                />
                <img
                  data-ns-animate
                  data-delay="0.3"
                  data-direction="right"
                  data-offset="50"
                  class="inline-block size-12 rounded-full ring-2 ring-white dark:ring-black object-cover"
                  src="./images/cordon.png"
                  alt="Cordón Pádel Club - club que confía en Matchly"
                />
                <div
                  data-ns-animate
                  data-delay="0.5"
                  data-direction="right"
                  data-offset="50"
                  class="inline-flex items-center justify-center size-12 rounded-full ring-2 ring-white dark:ring-black text-white dark:text-black bg-[#9DAEC6] text-tagline-3 font-medium"
                >
                  3+
                </div>
              </div>
              <div>
                <p
                  data-ns-animate
                  data-delay="0.6"
                  data-offset="40"
                  class="font-medium block text-left text-secondary text-tagline-2"
                >
                  En Latinoamérica
                </p>
                <p
                  data-ns-animate
                  data-delay="0.7"
                  data-offset="40"
                  class="text-tagline-3 dark:text-secondary/60"
                >
                  Clubes que ya confían en Matchly
                </p>
              </div>
            </div>

            <!-- btn-white -->
            <div data-ns-animate data-delay="0.8" class="w-[95%] mx-auto md:mx-0 md:w-full mb-10 lg:mb-14">
              <a
                href="./app-development-contact.html"
                class="btn btn-white btn-xl hover:btn-secondary w-full dark:btn-black dark:hover:btn-accent md:w-auto"
                aria-label="Solicitar una demo gratuita"
              >
                <span>Solicitar demo gratis</span>
              </a>
            </div>
          </div>
          <figure class="max-w-[900px] w-full animate-float" data-ns-animate data-delay="0.9" data-offset="50">
            <img
              src="./images/heromatchly.png"
              alt="Matchly - panel de administración para clubs de pádel"
              class="size-full object-cover"
            />
          </figure>
        </div>
      </div>
    </div>
  </div>

</section>
